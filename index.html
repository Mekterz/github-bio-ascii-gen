<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGen Pro - GitHub ASCII Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bio<span>Gen</span> Pro</h1>
            <p>L'outil ultime pour vos formes ASCII GitHub</p>
        </header>

        <main>
            <div class="upload-section">
                <label for="imageInput" class="custom-file-upload">📂 Choisir une image</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="controls">
                <div class="control-row">
                    <div class="control-group">
                        <label>Largeur</label>
                        <input type="range" id="widthScale" min="5" max="30" value="18">
                        <span id="widthValue">18</span>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>Contraste</label>
                        <input type="range" id="contrast" min="-100" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>Luminosité</label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                </div>

                <div class="toggles">
                    <label class="toggle-item">
                        <input type="checkbox" id="dithering" checked>
                        <span>Haute Fidélité</span>
                    </label>
                    <label class="toggle-item">
                        <input type="checkbox" id="invert">
                        <span>Inverser les tons</span>
                    </label>
                </div>
            </div>

            <div class="output-container">
                <div class="output-header">
                    <span>Résultat (<span id="charCount">0</span>/160)</span>
                    <button id="copyBtn">Copier pour Bio</button>
                </div>
                <pre id="output"></pre>
            </div>
        </main>

        <footer>
            <p>Utilisez des images à fond uni pour de meilleurs résultats.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
