<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOGEN PRO // ASCII INTERFACE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="container">
        <header>
            <h1>Bio<span>Gen</span>.exe</h1>
            <p>ADVANCED_ASCII_PROCESSOR // FIXED_WIDTH: 31px</p>
        </header>

        <main>
            <div class="upload-section">
                <label for="imageInput" class="custom-file-upload">SOURCE_IMAGE_UPLOAD</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="controls">
                <div class="control-row">
                    <div class="control-group">
                        <label>THRESHOLD (Détourage)</label>
                        <input type="range" id="threshold" min="0" max="255" value="128">
                    </div>
                    <div class="control-group">
                        <select id="charStyle" style="background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: inherit; font-size: 0.75rem; width: 100%; margin-top: 20px;">
                            <option value="classic">STYLE: CLASSIC BLOCKS (█)</option>
                            <option value="quadrants">STYLE: QUADRANTS (▖▗▘▙)</option>
                            <option value="braille">STYLE: BRAILLE (Dots)</option>
                        </select>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>CONTRAST</label>
                        <input type="range" id="contrast" min="-100" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>BRIGHTNESS</label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                </div>

                <div class="toggles">
                    <label class="toggle-item">
                        <input type="checkbox" id="invert"> INVERT_COLORS
                    </label>
                </div>
            </div>

            <div class="output-container">
                <div class="output-header">
                    <span>BUFFER_OUTPUT [WIDTH: 31 | SIZE: <span id="charCount">0</span>/160]</span>
                    <button id="copyBtn">COPY_TO_BIO</button>
                </div>
                <pre id="output"></pre>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
