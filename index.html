<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOGEN PRO // ASCII INTERFACE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="container">
        <header>
            <h1>Bio<span>Gen</span>.exe</h1>
            <p>ADVANCED_ASCII_PROCESSOR</p>
        </header>

        <main>
            <div class="upload-section">
                <label for="imageInput" class="custom-file-upload">SOURCE_IMAGE_UPLOAD</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="controls">
                <div class="control-row">
                    <div class="control-group">
                        <label>RESOLUTION_WIDTH</label>
                        <input type="range" id="widthScale" min="5" max="30" value="18">
                        <span id="widthValue" style="font-size: 0.7rem; color: #555;">18</span>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>CONTRAST_LEVEL</label>
                        <input type="range" id="contrast" min="-100" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>BRIGHTNESS_LEVEL</label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                </div>

                <div class="toggles">
                    <label class="toggle-item">
                        <input type="checkbox" id="dithering" checked> DITHERING_ON
                    </label>
                    <label class="toggle-item">
                        <input type="checkbox" id="invert"> INVERT_CHANNELS
                    </label>
                    <div class="control-group" style="flex: 1; text-align: right;">
                        <select id="charStyle" style="background: #000; color: #666; border: 1px solid #333; padding: 5px; font-family: inherit; font-size: 0.7rem;">
                            <option value="braille">RENDER_TYPE: BRAILLE</option>
                            <option value="blocks">RENDER_TYPE: BLOCKS</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="output-container">
                <div class="output-header">
                    <span>BUFFER_OUTPUT [CHAR_COUNT: <span id="charCount">0</span>/160]</span>
                    <button id="copyBtn">EXPORT_TO_CLIPBOARD</button>
                </div>
                <pre id="output"></pre>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
